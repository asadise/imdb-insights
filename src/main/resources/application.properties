spring.application.name=imdb-insights

spring.datasource.url=jdbc:h2:file:./data/imdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

imdb.titles=./src/main/resources/data/sample.title.basics.tsv
imdb.names=./src/main/resources/data/sample.name.basics.tsv
imdb.principals=./src/main/resources/data/sample.title.principals.tsv
imdb.rating=./src/main/resources/data/title.ratings.tsv